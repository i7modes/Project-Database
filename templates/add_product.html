<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Add New Product</h1>

<div class="card">
    <form method="POST">

        <label>Product Name</label>
        <input type="text" name="name" required>

        <label>Unit Price</label>
        <input type="number" step="0.01" name="unit_price" required>

        <label>Discount</label>
        <input type="number" step="0.01" name="discount" value="0">

        <label>Category</label>
        <select name="category_id" required>
            <option value="">-- Select Category --</option>
            {% for c in categories %}
                <option value="{{ c.CategoryID }}">{{ c.Name }}</option>
            {% endfor %}
        </select>

        <div class="actions">
            <button class="primary" type="submit">Save Product</button>
            <a href="{{ url_for('admin_product') }}">
                <button class="secondary" type="button">Back</button>
            </a>
        </div>

    </form>
</div>

</body>
</html>
