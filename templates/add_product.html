<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<h1>Add New Product</h1>

<div class="card">
    <form method="POST">
        <label>Product Name</label>
        <input type="text" name="name" required>

        <label>Unit Price</label>
        <input type="number" name="unit_price" step="0.01" required>

        <label>Discount</label>
        <input type="number" name="discount" step="0.01" value="0.00">

        <label>Category</label>
        <select name="category_id">
            <option value="">(No Category)</option>
            {% for c in categories %}
                <option value="{{ c.CategoryID }}">{{ c.Name }}</option>
            {% endfor %}
        </select>

        <label>Image Filename</label>
        <input type="text" name="image_url" placeholder="e.g., apple.png">

        <div class="actions">
            <button class="primary" type="submit">Save Product</button>
            <a href="{{ url_for('admin_product') }}">
                <button class="secondary" type="button">Back</button>
            </a>
        </div>
    </form>
</div>

</body>
</html>
