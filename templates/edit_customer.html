<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

</head>
<body>

<h1>Edit Customer</h1>

<div class="card">
    <form method="POST">
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ customer.FirstName }}" required>

        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ customer.LastName }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ customer.Email }}" required>

        <label>Password</label>
        <input type="text" name="password" value="{{ customer.Password }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ customer.Phone or '' }}">

        <label>Address</label>
        <input type="text" name="address" value="{{ customer.Address or '' }}">

        <div class="actions">
            <button class="primary" type="submit">Save Changes</button>
            <a href="{{ url_for('admin_customer') }}">
                <button class="secondary" type="button">Back</button>
            </a>
        </div>
    </form>
</div>

</body>
</html>
