<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; background-color: #f4f4f9; }
        h1 { color: #2c3e50; text-align: center; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        label { font-weight: 600; color: #34495e; }
        input { width: 100%; padding: 10px; margin-top: 6px; margin-bottom: 14px; border: 1px solid #ddd; border-radius: 6px; }
        .actions { display: flex; gap: 10px; }
        button { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; }
        .primary { background:#2c3e50; color:white; }
        .secondary { background:#ecf0f1; }
        a { text-decoration:none; }
    </style>
</head>
<body>

<h1>Edit Customer</h1>

<div class="card">
    <form method="POST">
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ customer.FirstName }}" required>

        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ customer.LastName }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ customer.Email }}" required>

        <label>Password</label>
        <input type="text" name="password" value="{{ customer.Password }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ customer.Phone or '' }}">

        <label>Address</label>
        <input type="text" name="address" value="{{ customer.Address or '' }}">

        <div class="actions">
            <button class="primary" type="submit">Save Changes</button>
            <a href="{{ url_for('dashboard') }}">
                <button class="secondary" type="button">Back</button>
            </a>
        </div>
    </form>
</div>

</body>
</html>
