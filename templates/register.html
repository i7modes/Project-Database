<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Al-Salam Supermarket</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <style>
        /* Specific enhancement for the registration button */
        .btn-register {
            width: 100%;
            padding: 14px;
            font-weight: bold;
            background-color: #064e3b;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .btn-register:hover {
            background-color: #043d2e; /* Slightly darker teal on hover */
        }

        .btn-register:active {
            transform: scale(0.98); /* Subtle click effect */
        }
    </style>
</head>
<body style="background: #f3f4f6; display: flex; justify-content: center; align-items: center; padding: 40px 0; margin: 0;">

    <div class="card" style="width: 100%; max-width: 500px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-radius: 12px; background: white;">
        <h2 style="text-align: center; color: #064e3b; margin-bottom: 20px;">Create Account</h2>
        <p style="text-align: center; color: #666; margin-bottom: 25px;">Join Al-Salam Supermarket today.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

        <form method="POST">
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #374151;">First Name</label>
                    <input type="text" name="first_name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
                <div style="flex: 1;">
                    <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #374151;">Last Name</label>
                    <input type="text" name="last_name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
                </div>
            </div>

            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #374151;">Email Address</label>
            <input type="email" name="email" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;">

            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #374151;">Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;">

            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #374151;">Phone Number</label>
            <input type="text" name="phone" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;">

            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: #374151;">Address</label>
            <input type="text" name="address" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 25px; box-sizing: border-box;">

            <div class="actions" style="display: flex; flex-direction: column; gap: 15px;">
                <button class="btn-register" type="submit">Create My Account</button>

                <p style="text-align: center; font-size: 14px; margin: 0; color: #4b5563;">
                    Already have an account? <a href="{{ url_for('login') }}" style="color: #3498db; text-decoration: none; font-weight: bold;">Login here</a>
                </p>
                <a href="{{ url_for('shop_page') }}" style="text-align: center; color: #7f8c8d; text-decoration: none; font-size: 14px;">Back to Shop</a>
            </div>
        </form>
    </div>

</body>
</html>
