<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Customer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

</head>
<body>

<h1>Edit Employee</h1>

<div class="card">
    <form method="POST">
        <label>First Name</label>
        <input type="text" name="first_name" value="{{ Emp.FirstName }}" required>

        <label>Last Name</label>
        <input type="text" name="last_name" value="{{ Emp.LastName }}" required>

        <label>Email</label>
        <input type="email" name="email" value="{{ Emp.Email }}" required>

        <label>Password</label>
        <input type="text" name="password" value="{{ Emp.Password }}" required>

        <label>Phone</label>
        <input type="text" name="phone" value="{{ Emp.Phone or '' }}">

        <label>Address</label>
        <input type="text" name="address" value="{{ Emp.Address or '' }}">

        <label>Role</label>
        <select name="role" required>
            <option value="">-- Select Role --</option>
            <option value="Admin" {% if Emp.Role =="Admin" %} selected {% endif %} >Admin</option>
            <option value="Staff" {% if Emp.Role =="Staff" %} selected {% endif %} >Staff</option>
        </select>

        <div class="actions">
            <button class="primary" type="submit">Save Changes</button>
            <a href="{{ url_for('admin_employee') }}">
                <button class="secondary" type="button">Back</button>
            </a>
        </div>
    </form>
</div>
    <button class="back-btn" onclick="history.back()">← Back</button>

</body>
</html>
