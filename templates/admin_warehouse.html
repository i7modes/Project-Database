<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warehouse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="section" id="customers">
        <h2>👤 Warehouse <span class="pill">Manage (View / Add / Edit / Delete)</span></h2>
        <hr>
        <a class="btn btn-primary" href="{{ url_for('add_warehouse') }}">➕ Add Warehouse</a>
        <div class="card">
            {% if warehouse %}
            <table>
                <thead>
                    <tr>
                        <th>WID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for w in warehouse %}
                    <tr>
                        <td class="money">{{ w.WarehouseID }}</td>
                        <td>{{ w.Name }}</td>
                        <td>{{ w.Address }}</td>
                        <td>
                            <div class="actions">
                                <a href="{{ url_for('edit_warehouse', Ware_id=w.WarehouseID) }}" class="btn btn-small btn-update">✏️ Edit</a>

                                <form action="{{ url_for('delete_warehouse', Ware_id=w.WarehouseID) }}"
                                      method="POST" style="margin:0;">
                                    <button class="btn btn-small btn-delete"
                                            type="submit"
                                            onclick="return confirm('Are you sure you want to delete this customer?');">
                                        🗑️ Delete
                                    </button>
                                </form>
                                <a href="{{ url_for('admin_warehouse_product', Ware_id=w.WarehouseID) }}" class="btn btn-small btn-updateQauntity">✏️ Edit qunatity</a>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <div class="empty">No warehouse yet. Click “Add warehouse”.</div>
            {% endif %}
        </div>
    </div>
</body>
</html>
