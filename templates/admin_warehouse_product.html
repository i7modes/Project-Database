<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Warehouse Products</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>

<div class="section" id="products">
    <h2>Warehouse Products <span class="pill">Manage (View / Edit / Delete)</span></h2>

    <a class="btn btn-primary" href="{{ url_for('add_warehouse_product',Ware_id=Ware_id) }}">➕ Add Product</a>

    <div class="card">
        {% if product %}
        <table>
            <thead>
                <tr>
                    <th>PID</th>
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for p in product %}
                <tr>
                    <td class="money">{{ p.ProductID }}</td>
                    <td>{{ p.Name }}</td>
                    <td>{{ p.Quantity }}</td>
                    <td>
                        <div class="actions">
                            <a href="{{ url_for('edit_warehouse_product',Ware_id=Ware_id ,P_id=p.ProductID) }}"
                               class="btn btn-small btn-update">✏️ Edit</a>

                            <form action="{{ url_for('delete_warehouse_product',Ware_id=Ware_id ,P_id=p.ProductID) }}"
                                  method="POST" style="margin:0;">
                                <button class="btn btn-small btn-delete"
                                        type="submit"
                                        onclick="return confirm('Are you sure you want to delete this product?');">
                                    🗑️ Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty">No products yet. Click “Add Product”.</div>
        {% endif %}
    </div>
</div>
    <a href="{{ url_for('admin_warehouse') }}">
        <button class="back-btn" onclick="history.back()">← Back</button>
    </a>
</body>
</html>
