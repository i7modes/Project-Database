<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>

    <div class="section" id="customers">
        <h2>👤 Customers <span class="pill">Manage (View / Add / Edit / Delete)</span></h2>
        <hr>
        <div class="card">
            {% if customer and customer|length > 0 %}
            <table>
                <thead>
                    <tr>
                        <th>CID</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for c in customer %}
                    <tr>
                        <td class="money">{{ c.CustomerID }}</td>
                        <td>{{ c.FirstName }} {{ c.LastName }}</td>
                        <td>{{ c.Phone }}</td>
                        <td>{{ c.Address }}</td>
                        <td>
                            <div class="actions">
                                <form action="{{ url_for('delete_customer', customer_id=c.CustomerID) }}"
                                      method="POST" style="margin:0;">
                                    <button class="btn btn-small btn-delete"
                                            type="submit"
                                            onclick="return confirm('Are you sure you want to delete this customer?');">
                                        🗑️ Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <div class="empty">No customers yet”.</div>
            {% endif %}
        </div>
    </div>
    <a href="{{ url_for('admin') }}">
        <button class="back-btn" onclick="history.back()">← Back</button>
    </a>
</body>
</html>
