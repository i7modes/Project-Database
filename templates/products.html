<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<h1>Products</h1>

<div class="card">
  <h3>Add Product</h3>
  <form method="POST" action="{{ url_for('add_product') }}">
    <div class="row">
      <div>
        <label>Name</label>
        <input name="name" required>
      </div>
      <div>
        <label>Unit Price</label>
        <input name="unit_price" type="number" step="0.01" required>
      </div>
      <div>
        <label>Discount</label>
        <input name="discount" type="number" step="0.01" value="0">
      </div>
      <div>
        <label>Category</label>
        <select name="category_id">
          <option value="">(No Category)</option>
          {% for c in categories %}
            <option value="{{ c.CategoryID }}">{{ c.Name }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <br>
    <button class="btn btn-add" type="submit">+ Add</button>
    <a href="{{ url_for('dashboard') }}"><button class="btn" style="background:#7f8c8d;" type="button">Back</button></a>
  </form>
</div>

<div class="card">
  <h3>All Products</h3>
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Name</th><th>Price</th><th>Discount</th><th>Category</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for p in products %}
      <tr>
        <td>{{ p.ProductID }}</td>
        <td>{{ p.Name }}</td>
        <td>${{ p.UnitPrice }}</td>
        <td>${{ p.Discount }}</td>
        <td>{{ p.CategoryName or '-' }}</td>
        <td>
          <div class="actions">
            <a href="{{ url_for('edit_product', product_id=p.ProductID) }}">
              <button class="btn btn-edit" type="button">Edit</button>
            </a>
            <form method="POST" action="{{ url_for('delete_product', product_id=p.ProductID) }}">
              <button class="btn btn-del" type="submit" onclick="return confirm('Delete this product?');">Delete</button>
            </form>
          </div>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

</body>
</html>
