<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transactions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="section">
    <h2>Transactions <span class="pill">View Only</span></h2>
    <hr>

    <div class="card">
        {% if transactions %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Total</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for t in transactions %}
                <tr>
                    <td class="money">{{ t.TransactionID }}</td>
                    <td>{{ t.TransactionTimestamp }}</td>
                    <td>{{ t.CustomerName or '-' }}</td>
                    <td class="money">${{ t.TotalAmount }}</td>
                    <td>
                        <a href="{{ url_for('admin_transaction_details', transaction_id=t.TransactionID) }}"
                           class="btn btn-small btn-update">
                            👁 View
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <div class="empty">No transactions found.</div>
        {% endif %}
    </div>
</div>

<a href="{{ url_for('admin') }}" class="back-btn">← Back</a>

</body>
</html>
