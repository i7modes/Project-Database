<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
</head>
<body>
    <h1>Edit Product: {{ product.Name }}</h1>
    <div class="card">
        <form method="POST">
            <label>Product Name</label>
            <input name="name" value="{{ product.Name }}" required>

            <label>Unit Price</label>
            <input name="unit_price" type="number" step="0.01" value="{{ product.UnitPrice }}" required>

            <label>Discount</label>
            <input name="discount" type="number" step="0.01" value="{{ product.Discount }}">

            <label>Category</label>
            <select name="category_id">
                <option value="">(No Category)</option>
                {% for c in categories %}
                    <option value="{{ c.CategoryID }}" {% if product.CategoryID == c.CategoryID %}selected{% endif %}>
                        {{ c.Name }}
                    </option>
                {% endfor %}
            </select>

            <label>Image Filename (e.g., milk.png)</label>
            <input name="image_url" value="{{ product.ImageURL }}">
            <p style="font-size: 0.8em; color: gray;">Place the image file in /static/uploads/</p>

            <div class="actions">
                <button class="primary" type="submit">Save Changes</button>
                <a href="{{ url_for('admin_product') }}"><button class="secondary" type="button">Cancel</button></a>
            </div>
        </form>
    </div>
    <button class="back-btn" onclick="history.back()">← Back</button>

</body>
</html>
