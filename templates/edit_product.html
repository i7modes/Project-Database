<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Product</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>
<body>

<h1>Edit Product</h1>

<div class="card">
  <form method="POST">
    <label>Name</label>
    <input name="name" value="{{ product.Name }}" required>

    <label>Unit Price</label>
    <input name="unit_price" type="number" step="0.01" value="{{ product.UnitPrice }}" required>

    <label>Discount</label>
    <input name="discount" type="number" step="0.01" value="{{ product.Discount or 0 }}">

    <label>Category</label>
    <select name="category_id">
      <option value="">(No Category)</option>
      {% for c in categories %}
        <option value="{{ c.CategoryID }}" {% if product.CategoryID == c.CategoryID %}selected{% endif %}>
          {{ c.Name }}
        </option>
      {% endfor %}
    </select>

    <div class="actions">
      <button class="primary" type="submit">Save</button>
      <a href="{{ url_for('products_page') }}"><button class="secondary" type="button">Back</button></a>
    </div>
  </form>
</div>

</body>
</html>
