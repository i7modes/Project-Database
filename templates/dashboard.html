<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supermarket Dashboard</title>
    <style>
        body { font-family: sans-serif; max-width: 1000px; margin: 2rem auto; padding: 0 1rem; background-color: #f4f4f9; }
        h1 { color: #2c3e50; text-align: center; }
        h2 { color: #34495e; border-bottom: 2px solid #ddd; padding-bottom: 0.5rem; margin-top: 2rem; }

        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 1rem; }
        .highlight { font-size: 2rem; color: #27ae60; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #ddd; }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f1f1f1; }

        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; color: white; }
        .btn-add { background: #2c3e50; }
        .btn-update { background: #34495e; }
        .btn-delete { background: #c0392b; }
        .actions { display: flex; gap: 8px; align-items: center; }
        .muted { color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>

    <h1>Supermarket Dashboard</h1>

    <!-- Quick Actions -->
    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
        <div>
            <strong>Quick Actions</strong><br>
            <span class="muted">Add a new customer to the database</span>
        </div>
        <a href="{{ url_for('add_customer') }}" style="text-decoration:none;">
            <button class="btn btn-add">+ Add Customer</button>
        </a>
    </div>

    <!-- Customers -->
    <h2>Customer Information</h2>
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>CustomerID</th>
                    <th>FirstName</th>
                    <th>LastName</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for c in customer %}
                <tr>
                    <td>{{ c.CustomerID }}</td>
                    <td>{{ c.FirstName }}</td>
                    <td>{{ c.LastName }}</td>
                    <td>{{ c.Phone }}</td>
                    <td>{{ c.Address }}</td>
                    <td>
                        <div class="actions">
                            <a href="{{ url_for('edit_customer', customer_id=c.CustomerID) }}" style="text-decoration:none;">
                                <button class="btn btn-update">Update</button>
                            </a>

                            <form action="{{ url_for('delete_customer', customer_id=c.CustomerID) }}"
                                  method="POST" style="margin:0;">
                                <button class="btn btn-delete"
                                        type="submit"
                                        onclick="return confirm('Are you sure you want to delete this customer?');">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
